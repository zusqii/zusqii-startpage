<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zusqii-startpage</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="main-container">
        <div class="content-card">
            <header>
                <div id="greeting">Welcome, Zusqii</div>
                <div id="clock">00:00</div>
                <div id="date">Loading...</div>
            </header>

            <div class="search-wrapper">
                <form action="https://www.google.com/search" method="get">
                    <input type="text" name="q" id="search-input" placeholder="Search..." autocomplete="off" autofocus>
                </form>
            </div>

            <section>
                <h3>Tools</h3>
                <div class="pill-container">
                    <a href="https://gemini.google.com/" class="pill">Gemini</a>
                    <a href="https://claude.ai/" class="pill">Claude</a>
                    <a href="https://mail.google.com/" class="pill">Gmail</a>
                    <a href="https://moodle.com/" class="pill">Moodle</a>
                </div>
            </section>

            <section>
                <h3>Social Media</h3>
                <div class="pill-container">
                    <a href="https://github.com/zusqii" class="pill">Github</a>
                    <a href="https://reddit.com/" class="pill">Reddit</a>
                    <a href="https://web.whatsapp.com/" class="pill">Whatsapp</a>
                    <a href="https://youtube.com/" class="pill">Youtube</a>
                </div>
            </section>

            <section>
                <h3>Utilities</h3>
                <div class="pill-container">
                    <a href="https://pinterest.com/" class="pill">Pinterest</a>
                    <a href="https://wallhaven.cc/" class="pill">Wallhaven</a>
                    <a href="https://mp3juice.fr/" class="pill">Mp3Juice</a>
                </div>
            </section>

            <a href="https://github.com/zusqii" class="watermark">made by zusqii</a>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // Auto-focus logic
        window.onload = () => document.getElementById('search-input').focus();
        document.addEventListener('click', () => document.getElementById('search-input').focus());
    </script>
</body>
</html>
